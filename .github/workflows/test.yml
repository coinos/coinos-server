name: Test

on:
  push:
    branches: [master, staging]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test test/api.test.ts test/forward.test.ts test/onchain.test.ts
