# Fulcrum for the local regtest stack (mirrors prod's config, pointed at `bc`).
# Serves the Electrum protocol over TCP (50001) and WebSocket (50003) — the WS
# is what the Hal browser wallet connects to for data + realtime push. Block and
# mempool notifications arrive over bitcoind's ZMQ (auto-discovered via the
# getzmqnotifications RPC), so polltimesecs is just a slow safety net.
datadir = /data
bitcoind = bc:18443
rpcuser = admin1
rpcpassword = 123
tcp = 0.0.0.0:50001
ws = 0.0.0.0:50003
peering = false
announce = false
db_mem = 1000
bitcoind_clients = 1
polltimesecs = 5
zmq_allow_hashtx = true
